name: Android APK Compiler Cloud
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Unzip Project Structure
      run: |
        unzip -q project.zip -d temp_extract
        if [ -d temp_extract/HinglishCipher ]; then
          mv temp_extract/HinglishCipher/* .
        elif [ -d temp_extract/Hinglish-Cipher-main ]; then
          mv temp_extract/Hinglish-Cipher-main/* .
        else
          mv temp_extract/* .
        fi
        rm -rf temp_extract project.zip
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Initialize Gradle Framework
      run: gradle wrapper --gradle-version 8.2.2
    - name: Build App with Gradle
      run: ./gradlew assembleDebug
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: HinglishCipherKeyboard-APK
        path: app/build/outputs/apk/debug/app-debug.apk
